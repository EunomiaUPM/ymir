# rustfmt configuration — stable toolchain compatible
# Run:   cargo fmt
# Check: cargo fmt --check

edition = "2021"

# ── width ─────────────────────────────────────────────────────────────────────
max_width            = 100
tab_spaces           = 4
hard_tabs            = false
use_small_heuristics = "Default"

# ── line endings ──────────────────────────────────────────────────────────────
newline_style = "Unix"

# ── imports ───────────────────────────────────────────────────────────────────
reorder_imports = true
reorder_modules = true
